{% extends "layout.html" %}

{% block content %}
<div class="container">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    #dont have account
    <p>Don't have an account? <a href="{% url 'register' %}">Register here</a>.</p>

{% endblock %}
